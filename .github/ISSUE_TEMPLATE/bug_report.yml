name: Bug Report
description: 反馈一个可复现的问题
title: "[Bug] "
labels: []
body:
  - type: input
    id: version
    attributes:
      label: App Version
      description: 你使用的应用版本
      placeholder: 例如 0.1.0
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: 你遇到问题的平台
      options:
        - Windows
        - macOS
        - Linux
        - Android
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: 问题描述
      placeholder: 简要描述问题
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: 复现步骤
      placeholder: |
        1. 打开...
        2. 点击...
        3. 出现...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Result
      description: 你期望看到什么
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Result
      description: 实际发生了什么
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs Or Screenshots
      description: 可选，附上日志、报错或截图
      render: shell
    validations:
      required: false
